<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="API Explorer — a fast, searchable directory of 1,400+ free public APIs."
    />
    <title>API Explorer — find free public APIs</title>
    <script>
      (function () {
        var theme = "dark";
        try {
          var stored = localStorage.getItem("api-explorer:theme");
          if (stored === "light" || stored === "dark") theme = stored;
          else if (window.matchMedia("(prefers-color-scheme: light)").matches)
            theme = "light";
        } catch (e) {
          /* private mode — keep dark */
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0C0A'/%3E%3Ctext x='6' y='22' font-family='monospace' font-size='16' fill='%234ADE80'%3E%3E_%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
